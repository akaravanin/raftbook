syntax = "proto3";

package exchange.v1;

// ── Command plane ──────────────────────────────────────────────────────────────
//
// gRPC surface for the matching engine.  Every request carries a caller-generated
// command_id for idempotent retries: submitting the same command_id twice is safe.

service Exchange {
  // Submit a new limit order.  Idempotent: same command_id returns same result.
  rpc PlaceOrder(PlaceOrderRequest) returns (PlaceOrderResponse);

  // Cancel a resting limit order.  Idempotent.
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);

  // Server-streaming: replays events from from_seq then tails live events.
  rpc StreamEvents(StreamEventsRequest) returns (stream EventRecord);
}

// ── Enums ──────────────────────────────────────────────────────────────────────

enum Side {
  // proto3 requires a zero default; treat as a validation error if received.
  SIDE_UNSPECIFIED = 0;
  SIDE_BID         = 1;
  SIDE_ASK         = 2;
}

// ── PlaceOrder ─────────────────────────────────────────────────────────────────

message PlaceOrderRequest {
  string command_id = 1; // UUID v4 generated by caller
  uint64 order_id   = 2;
  uint64 user_id    = 3;
  Side   side       = 4;
  uint64 price      = 5; // integer ticks (e.g. cents)
  uint64 quantity   = 6; // integer lots
}

message Fill {
  uint64 maker_order_id = 1;
  uint64 taker_order_id = 2;
  uint64 price          = 3;
  uint64 quantity       = 4;
}

message PlaceOrderResponse {
  uint64        accepted_seq   = 1; // seq of the OrderAccepted event
  repeated Fill fills          = 2; // zero or more immediate fills
  uint64        remaining_qty  = 3; // quantity left resting in the book
  bool          inserted       = 4; // false = this was an idempotent retry
}

// ── CancelOrder ────────────────────────────────────────────────────────────────

message CancelOrderRequest {
  string command_id = 1;
  uint64 order_id   = 2;
}

message CancelOrderResponse {
  uint64 event_seq = 1;
  bool   inserted  = 2;
}

// ── StreamEvents ───────────────────────────────────────────────────────────────

message StreamEventsRequest {
  uint64 from_seq = 1; // 0 = from the very beginning
}

// ── Shared event types ─────────────────────────────────────────────────────────

message OrderAccepted {
  uint64 order_id = 1;
}

message TradeExecuted {
  uint64 maker_order_id = 1;
  uint64 taker_order_id = 2;
  uint64 price          = 3;
  uint64 quantity       = 4;
}

message OrderCanceled {
  uint64 order_id = 1;
}

message EventRecord {
  uint64 seq = 1;
  oneof payload {
    OrderAccepted order_accepted = 2;
    TradeExecuted trade_executed = 3;
    OrderCanceled order_canceled = 4;
  }
}
